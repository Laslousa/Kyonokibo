<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <title>Kyōnokibō - Accueil</title>
    <link rel="stylesheet" href="../../style.css" />
    <link rel="stylesheet" href="home.css" />
    <script src="../../script.js" defer></script>
    <script src="home.js" defer></script>

  <body class="home-page">
    <main class="app-shell home-layout">
      <section class="home-left">
        <header class="page-header home-header">
          <h1>Bonjour Jean, on est le Samedi 7 mars</h1>
        </header> 
        <span class="audio-control"> 🔊 </span>
      </section>

      <section class="home-right section-block">
        <h2>Prochain rendez-vous : </h2>

        <article class="event-card" data-start="11:00" data-location="Cabinet Dr Lefèvre">
          <div class="event-card-info">
            <p class="event-time">12:00</p>
            <p class="event-title">Rendez-vous médecin</p>
            <p class="event-place">Cabinet Dr Lefèvre</p>
            <p class="event-description-title">Description :</p>
            <p class="event-description">
              Votre fille Sophie va vous accompagner et vous achètera votre glace favorite après le rendez-vous.
            </p>
          </div>
          <div class="carousel">
            <button class="carousel-prev" aria-label="Image précédente">&#10094;</button>
            <div class="carousel-track">
              <img src="../../public/images/image-fille.png" alt="Image 1" class="carousel-image" />
            </div>
            <button class="carousel-next" aria-label="Image suivante">&#10095;</button>
          </div>
        </article>

        
        <section class="footer">
          <p>Besoin d'aide ? Contactez votre fille au 07 23 45 67 89</p>
        </section>
        
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Navigation basse">

      <button class="bottom-nav-item" data-nav="../calendar/calendar.html">

      </button>
      <button class="bottom-nav-item" data-nav="../quiz/quiz.html">

      </button>
      <button class="bottom-nav-item" data-nav="../family/family.html">

        <span class="nav-label">Famille</span>
      </button>
      <button class="bottom-nav-item" data-nav="../settings/settings.html">
        <span class="nav-icon">⚙️</span>

      </button>
