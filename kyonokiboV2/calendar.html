<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kyono Kibo - Calendar</title>
  <link rel="stylesheet" href="calendar.css">
  <link rel="stylesheet" href="nav.css">
</head>
<body>
  <main class="app-shell">
    <div class="stack">
      <div class="calendar-header">
        <div class="eyebrow">Votre planning</div>
        <h1 class="title">Calendrier</h1>
      </div>

      <div class="week-nav">
        <div>
          <div class="week-label">mars 2026</div>
        </div>
      </div>

      <div class="day-strip">
        <button class="day-pill is-disabled" type="button">
          <div class="day-abbr">Lun</div>
          <div class="day-num">9</div>
          <div class="day-dot" style="background:transparent"></div>
        </button>
        <button class="day-pill is-disabled" type="button">
          <div class="day-abbr">Mar</div>
          <div class="day-num">10</div>
          <div class="day-dot" style="background:#6A96C8"></div>
        </button>
        <button class="day-pill is-disabled" type="button">
          <div class="day-abbr">Mer</div>
          <div class="day-num">11</div>
          <div class="day-dot" style="background:transparent"></div>
        </button>
        <button class="day-pill selected today" type="button">
          <div class="day-abbr">Jeu</div>
          <div class="day-num">12</div>
          <div class="day-dot" style="background:rgba(255,255,255,0.7)"></div>
        </button>
        <button class="day-pill is-disabled" type="button">
          <div class="day-abbr">Ven</div>
          <div class="day-num">13</div>
          <div class="day-dot" style="background:#9DBFA3"></div>
        </button>
        <button class="day-pill is-disabled" type="button">
          <div class="day-abbr">Sam</div>
          <div class="day-num">14</div>
          <div class="day-dot" style="background:transparent"></div>
        </button>
        <button class="day-pill" type="button">
          <div class="day-abbr">Dim</div>
          <div class="day-num">15</div>
          <div class="day-dot" style="background:#C4A882"></div>
        </button>
      </div>

      <div class="detail-block">
        <div class="detail-heading">
          <div class="detail-title-group">
            <div class="detail-title-row">
              <div class="detail-title">Jeudi</div>
              <span class="today-chip">Aujourd'hui</span>
            </div>
            <div class="detail-date">12 mars 2026</div>
          </div>
          <button class="add-event-btn" type="button">Ajouter un événement</button>
        </div>
        <div class="appointment-card">
          <div class="appointment-stripe" style="background:#E07840"></div>
          <div class="appointment-time" style="color:#E07840">12:00</div>
          <div class="appointment-divider"></div>
          <div>
            <div class="appt-title">Rendez-vous medecin</div>
            <div class="appt-location">📍 Cabinet Dr Lefevre</div>
          </div>
          <div class="avatar-stack">
            <div class="avatar" style="width:80px;height:80px;background:linear-gradient(135deg, #B39BC8, #B39BC8BB);font-size:32px;box-shadow:0 4px 16px #B39BC855">
              <img src="./image-fille2.png" alt="Avatar de Sophie" class="avatar-img">
            </div>
            <div class="avatar-label">Sophie</div>
          </div>
          <button class="appointment-more" type="button">Voir plus</button>
        </div>
      </div>
    </div>
  </main>
  <nav class="bottom-nav" aria-label="Navigation principale">
    <a class="nav-item" href="home.html">
      <span class="nav-icon">&#8962;</span>
      <span class="nav-label">Accueil</span>
    </a>
    <a class="nav-item active" href="calendar.html">
      <span class="nav-icon">&#128197;</span>
      <span class="nav-label">Calendrier</span>
    </a>
    <a class="nav-item" href="quiz.html">
      <span class="nav-icon">&#129504;</span>
      <span class="nav-label">Quiz</span>
    </a>
    <a class="nav-item" href="family.html">
      <span class="nav-icon">&#128106;</span>
      <span class="nav-label">Famille</span>
    </a>
    <a class="nav-item" href="settings.html">
      <span class="nav-icon">&#9881;</span>
      <span class="nav-label">Parametres</span>
    </a>
  </nav>
  <script src="nav.js"></script>
</body>
</html>
