<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kyono Kibo - Calendar</title>
  <link rel="stylesheet" href="./calendar.css">
  <link rel="stylesheet" href="../nav/nav.css">
</head>
<body>
  <main class="app-shell">
    <div class="stack">
      <div class="calendar-header">
        <div class="eyebrow">Votre planning</div>
        <h1 class="title">Calendrier</h1>
      </div>

      <div class="week-nav">
        <div>
          <div class="week-label">mars 2026</div>
        </div>
      </div>

      <div class="day-strip">
        <button class="day-pill is-disabled" type="button">
          <div class="day-abbr">Lun</div>
          <div class="day-num">9</div>
          <div class="day-dot" style="background:transparent"></div>
        </button>
        <button class="day-pill is-disabled" type="button">
          <div class="day-abbr">Mar</div>
          <div class="day-num">10</div>
          <div class="day-dot" style="background:#6A96C8"></div>
        </button>
        <button class="day-pill is-disabled" type="button">
          <div class="day-abbr">Mer</div>
          <div class="day-num">11</div>
          <div class="day-dot" style="background:transparent"></div>
        </button>
        <button class="day-pill selected today" type="button">
          <div class="day-abbr">Jeu</div>
          <div class="day-num">12</div>
          <div class="day-dot" style="background:rgba(255,255,255,0.7)"></div>
        </button>
        <button class="day-pill is-disabled" type="button">
          <div class="day-abbr">Ven</div>
          <div class="day-num">13</div>
          <div class="day-dot" style="background:#9DBFA3"></div>
        </button>
        <button class="day-pill is-disabled" type="button">
          <div class="day-abbr">Sam</div>
          <div class="day-num">14</div>
          <div class="day-dot" style="background:transparent"></div>
        </button>
        <button class="day-pill" type="button">
          <div class="day-abbr">Dim</div>
          <div class="day-num">15</div>
          <div class="day-dot" style="background:#C4A882"></div>
        </button>
      </div>

      <div class="detail-block">
        <div class="detail-heading">
          <div class="detail-title-group">
            <div class="detail-title-row">
              <div class="detail-title">Jeudi</div>
              <span class="today-chip">Aujourd'hui</span>
            </div>
            <div class="detail-date">12 mars 2026</div>
          </div>
          <button class="add-event-btn" type="button" data-open-event-modal>
            Ajouter un &eacute;v&eacute;nement
          </button>
        </div>
        <div class="events-list" data-events-list>
          <div class="appointment-card">
          <div class="appointment-stripe" style="background:#E07840"></div>
          <div class="appointment-time" style="color:#E07840">12:00</div>
          <div class="appointment-divider"></div>
          <div>
            <div class="appt-title">Rendez-vous medecin</div>
            <div class="appt-location">&#128205; Cabinet Dr Lefevre</div>
          </div>
          <div class="avatar-stack">
            <div class="avatar" style="width:80px;height:80px;background:linear-gradient(135deg, #B39BC8, #B39BC8BB);font-size:32px;box-shadow:0 4px 16px #B39BC855">
              <img src="../public/images/image-fille2.png" alt="Avatar de Sophie" class="avatar-img">
            </div>
            <div class="avatar-label">Sophie</div>
          </div>
          <button class="appointment-more" type="button">Voir plus</button>
          </div>
        </div>
        <div class="events-nav" data-events-nav>
          <button class="events-nav-btn" type="button" >
            &larr; Pr&eacute;c&eacute;dent
          </button>
          <div class="events-counter" data-event-counter>1/3</div>
          <button class="events-nav-btn" type="button">
            Suivant &rarr;
          </button>
        </div>
      </div>
    </div>
  </main>

  <section class="modal-backdrop is-hidden" data-event-modal aria-hidden="true">
    <div
      class="event-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="event-modal-title"
    >
      <div class="event-modal-head">
        <div>
          <div class="event-modal-kicker">Nouveau rendez-vous</div>
          <h2 id="event-modal-title">Ajouter un evenement</h2>
        </div>
        <button class="event-close-btn" type="button" data-close-event-modal aria-label="Fermer">
          &times;
        </button>
      </div>

      <form class="event-form" data-event-form>
        <label class="form-field">
          <span class="form-label">Titre</span>
          <input class="form-input" type="text" name="title" placeholder="Ex. Appeler Sophie" required />
        </label>

        <div class="form-row">
          <label class="form-field">
            <span class="form-label">Heure</span>
            <input class="form-input" type="time" name="time" required />
          </label>

          <label class="form-field">
            <span class="form-label">Lieu</span>
            <input class="form-input" type="text" name="location" placeholder="Ex. Maison" />
          </label>
        </div>

        <label class="form-field">
          <span class="form-label">Personne</span>
          <input class="form-input" type="text" name="person" placeholder="Ex. Sophie" />
        </label>

        <label class="form-field">
          <span class="form-label">Image</span>
          <div class="form-file-wrap">
            <span class="form-file-icon" aria-hidden="true">📎</span>
            <div class="form-file-ui" aria-hidden="true">
              <span class="form-file-trigger">Choisir un fichier</span>
              <span class="form-file-name" data-file-name>Aucun fichier choisi</span>
            </div>
            <input
              class="form-file-input"
              type="file"
              name="image"
              accept=".jpg,.jpeg,.png,image/jpeg,image/png"
              aria-label="Ajouter une image"
            />
            <button
              class="form-file-clear"
              type="button"
              data-clear-file
              aria-label="Supprimer le fichier selectionne"
              disabled
            >
              &times;
            </button>
          </div>
        </label>

        <label class="form-field">
          <span class="form-label">Note</span>
          <textarea class="form-textarea" name="note" rows="4" placeholder="Ajouter un detail utile..."></textarea>
        </label>

        <div class="form-actions">
          <button class="form-btn form-btn-secondary" type="button" data-close-event-modal>
            Annuler
          </button>
          <button class="form-btn form-btn-primary" type="submit">
            Enregistrer
          </button>
        </div>
      </form>
    </div>
  </section>
