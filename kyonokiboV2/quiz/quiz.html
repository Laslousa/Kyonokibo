<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz - Entra&icirc;nement m&eacute;moire</title>
    <link rel="stylesheet" href="./quiz.css" />

  <body>
    <aside class="quiz-hint-card" aria-label="Indice du quiz">
      <div class="hint-header">
        <span class="hint-dot" aria-hidden="true">&#128161;</span>
        <span class="hint-title">Indice</span>
      </div>
      <p class="hint-text">
        Hier, Tu as passé toute la journée avec cette personne.<br />
        Voici une photo d'elle plus jeune :
      </p>
      <div class="hint-visual" aria-hidden="true">
        <img
          src="../public/images/image-sophie-jeune.png"
          alt="Photo de Sophie jeune"
        />
      </div>
    </aside>

    <div class="main">
      <!-- Top bar -->
      <div class="topbar">
        <div class="topbar-row">
          <div>
            <div class="page-title">&#129504; Quiz du jour</div>
          </div>
          <div class="q-counter">1 / 4</div>
        </div>

        <!-- Progress bar -->
        <div class="prog-track">
          <div class="prog-fill"></div>
        </div>
      </div>

      <!-- Card -->
      <div class="card">
        <!-- Image -->
        <div class="img-wrap">
          <img src="../public/images/image-fille2.png" alt="Question photo" />
          <div class="img-overlay"></div>
          <div class="cat-chip">&#128100; Personnes</div>
        </div>

        <!-- Question -->
        <div class="q-section">
          <div class="q-text">Qui est cette personne dans votre vie&nbsp;?</div>
          <!-- <div class="q-hint">
            <span>&#128161;</span>
            <span>Prenez votre temps.</span>
          </div> -->
        </div>

        <!-- Answers -->
        <div class="answers">
          <!-- Correct answer (shown selected) -->
          <button class="ans-btn correct">
            <div class="ans-letter">&#10003;</div>
            <div class="ans-text">Un membre de la famille</div>
          </button>

          <button class="ans-btn">
            <div class="ans-letter">B</div>
            <div class="ans-text">Une amie de longue date</div>
          </button>

          <button class="ans-btn">
            <div class="ans-letter">C</div>
            <div class="ans-text">
              La caissi&egrave;re du supermarch&eacute;
            </div>
          </button>
          <button class="ans-btn">
            <div class="ans-letter">D</div>
            <div class="ans-text">Votre m&eacute;decin traitant</div>
          </button>
        </div>

        <!-- Feedback -->
        <!-- <div class="feedback">
          <div class="fb-emoji">&#127881;</div>
          <div>
            <div class="fb-title">Bravo !</div>
            <div class="fb-body">
              C'est la bonne r&eacute;ponse. Votre m&eacute;moire est en forme !
            </div>
          </div>
        </div> -->

        <!-- Next button -->
        <button class="next-btn">Question suivante &rarr;</button>
      </div>
      <!-- /card -->
    </div>
    <!-- /main -->
