<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz - Entra&icirc;nement m&eacute;moire</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./quiz.css" />
  </head>
  <body>
    <div class="main">
      <!-- Top bar -->
      <div class="topbar">
        <div class="topbar-row">
          <div>
            <div class="eyebrow">&#129504; Exercice du jour</div>
            <div class="page-title">Entra&icirc;nement<br />m&eacute;moire</div>
          </div>
          <div class="q-counter">1 / 4</div>
        </div>

        <!-- Progress bar -->
        <div class="prog-track">
          <div class="prog-fill"></div>
        </div>
      </div>

      <!-- Card -->
      <div class="card">
        <!-- Image -->
        <div class="img-wrap">
          <img src="../public/images/image-fille2.png" alt="Question photo" />
          <div class="img-overlay"></div>
          <div class="cat-chip">&#128100; Personnes</div>
        </div>

        <!-- Question -->
        <div class="q-section">
          <div class="q-text">
            Qui pourrait &ecirc;tre cette personne dans votre vie&nbsp;?
          </div>
          <div class="q-hint">
            <span>&#128161;</span>
            <span>Prenez votre temps. Faites confiance &agrave; votre instinct.</span>
          </div>
        </div>

        <!-- Answers -->
        <div class="answers">
          <!-- Correct answer (shown selected) -->
          <button class="ans-btn correct">
            <div class="ans-letter">&#10003;</div>
            Un membre de la famille
          </button>

          <button class="ans-btn">
            <div class="ans-letter">B</div>
            Un chauffeur de taxi
          </button>

          <button class="ans-btn">
            <div class="ans-letter">C</div>
            Une caissi&egrave;re
          </button>
        </div>

        <!-- Feedback -->
        <div class="feedback">
          <div class="fb-emoji">&#127881;</div>
          <div>
            <div class="fb-title">Bravo !</div>
            <div class="fb-body">
              C'est la bonne r&eacute;ponse. Votre m&eacute;moire est en forme !
            </div>
          </div>
        </div>

        <!-- Next button -->
        <button class="next-btn">Question suivante &rarr;</button>
      </div>
      <!-- /card -->
    </div>
    <!-- /main -->

    <!-- Bottom nav -->
    <nav class="bottom-nav" aria-label="Navigation principale">
      <a class="nav-item" href="../home/home.html">
        <span class="nav-icon">&#8962;</span>
        <span class="nav-label">Accueil</span>
      </a>
      <a class="nav-item" href="../calendar/calendar.html">
        <span class="nav-icon">&#128197;</span>
        <span class="nav-label">Calendrier</span>
      </a>
      <a class="nav-item active" href="../quiz/quiz.html" aria-current="page">
        <span class="nav-icon">&#129504;</span>
        <span class="nav-label">Quiz</span>
      </a>
      <a class="nav-item" href="../family/family.html">
        <span class="nav-icon">&#128106;</span>
        <span class="nav-label">Famille</span>
      </a>
      <a class="nav-item" href="../settings/settings.html">
        <span class="nav-icon">&#9881;</span>
        <span class="nav-label">Param&egrave;tres</span>
      </a>
    </nav>
    <script src="../nav/nav.js"></script>
  </body>
</html>
