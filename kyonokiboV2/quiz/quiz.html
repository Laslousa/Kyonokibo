    <title>Quiz - Entra&icirc;nement m&eacute;moire</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"

  <body>
    <div class="main">
      <!-- Top bar -->
      <div class="topbar">
        <div class="topbar-row">
          <div>
            <div class="page-title">&#129504; Quiz du jour</div>
          </div>
          <div class="q-counter">1 / 4</div>
        </div>

        <!-- Progress bar -->
        <div class="prog-track">
          <div class="prog-fill"></div>
        </div>
      </div>

      <!-- Card -->
      <div class="card">
        <!-- Image -->
        <div class="img-wrap">
          <img src="../public/images/image-fille2.png" alt="Question photo" />
          <div class="img-overlay"></div>
          <div class="cat-chip">&#128100; Personnes</div>
        </div>

        <!-- Question -->
        <div class="q-section">
          <div class="q-text">Qui est cette personne dans votre vie&nbsp;?</div>
          <!-- <div class="q-hint">
            <span>&#128161;</span>
            <span>Prenez votre temps.</span>
          </div> -->
        </div>

        <!-- Answers -->
        <div class="answers">
          <!-- Correct answer (shown selected) -->
          <button class="ans-btn correct">
            <div class="ans-letter">&#10003;</div>
            Un membre de la famille
          </button>

          <button class="ans-btn">
            <div class="ans-letter">B</div>
            Votre voisine
          </button>

          <button class="ans-btn">
            <div class="ans-letter">C</div>
            La caissi&egrave;re du supermarch&eacute;
          </button>
          <button class="ans-btn">
            <div class="ans-letter">D</div>
            Votre m&eacute;decin traitant
          </button>
        </div>

        <!-- Feedback -->
        <!-- <div class="feedback">
          <div class="fb-emoji">&#127881;</div>
          <div>
            <div class="fb-title">Bravo !</div>
            <div class="fb-body">
              C'est la bonne r&eacute;ponse. Votre m&eacute;moire est en forme !
            </div>
          </div>
        </div> -->

        <!-- Next button -->
        <button class="next-btn">Question suivante &rarr;</button>
      </div>
      <!-- /card -->
    </div>
