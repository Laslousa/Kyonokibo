<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz – Entraînement mémoire</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="quiz.css" />
  </head>
  <body>
    <div class="main">
      <!-- Top bar -->
      <div class="topbar">
        <div class="topbar-row">
          <div>
            <div class="eyebrow">🧠 Exercice du jour</div>
            <div class="page-title">Entraînement<br />mémoire</div>
          </div>
          <div class="q-counter">1 / 4</div>
        </div>

        <!-- Progress bar -->
        <div class="prog-track">
          <div class="prog-fill"></div>
        </div>
      </div>

      <!-- Card -->
      <div class="card">
        <!-- Image -->
        <div class="img-wrap">
          <img src="./image-fille2.png" alt="Question photo" />
          <div class="img-overlay"></div>
          <div class="cat-chip">👤 Personnes</div>
        </div>

        <!-- Question -->
        <div class="q-section">
          <div class="q-text">
            Qui pourrait être cette personne dans votre vie&nbsp;?
          </div>
          <div class="q-hint">
            <span>💡</span>
            <span>Prenez votre temps. Faites confiance à votre instinct.</span>
          </div>
        </div>

        <!-- Answers -->
        <div class="answers">
          <!-- Correct answer (shown selected) -->
          <button class="ans-btn correct">
            <div class="ans-letter">✓</div>
            Un membre de la famille
          </button>

          <button class="ans-btn">
            <div class="ans-letter">B</div>
            Un chauffeur de taxi
          </button>

          <button class="ans-btn">
            <div class="ans-letter">C</div>
            Une caissière
          </button>
        </div>

        <!-- Feedback -->
        <div class="feedback">
          <div class="fb-emoji">🎉</div>
          <div>
            <div class="fb-title">Bravo !</div>
            <div class="fb-body">
              C'est la bonne réponse. Votre mémoire est en forme !
            </div>
          </div>
        </div>

        <!-- Next button -->
        <button class="next-btn">Question suivante →</button>
      </div>
      <!-- /card -->
    </div>
    <!-- /main -->

    <!-- Bottom nav -->
    <nav class="bottom-nav" aria-label="Navigation principale">
      <a class="nav-item" href="home.html">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Accueil</span>
      </a>
      <a class="nav-item" href="calendar.html">
        <span class="nav-icon">📅</span>
        <span class="nav-label">Calendrier</span>
      </a>
      <a class="nav-item active" href="quiz.html" aria-current="page">
        <span class="nav-icon">🧠</span>
        <span class="nav-label">Quiz</span>
      </a>
      <a class="nav-item" href="family.html">
        <span class="nav-icon">👨‍👩‍👧</span>
        <span class="nav-label">Famille</span>
      </a>
      <a class="nav-item" href="settings.html">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Paramètres</span>
      </a>
    </nav>
    <script src="nav.js"></script>
  </body>
</html>
